<!-- Title -->
<coer-page-title
    [title]="title()"
    [breadcrumbs]="breadcrumbs()"
></coer-page-title> 

<nav>
    @for(item of _pages(); let index = $index; track item.Id) {           
        <a [routerLink]="_getPath(item)" class="animation-fadeIn">
            @if(item?.ShowIndex) {
                <span class="index">{{ index + 1 }}</span>
            }
          
            @else if((item?.Icon || '').length > 0) {
                <i [class]="item!.Icon"></i>
            }
            <span class="label"> {{ item.Label }} </span>
        </a> 
    }
</nav>
