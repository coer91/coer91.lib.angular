<section 
    [ngClass]="{ 'coer-grid-container': useContainer(), 'invisible': isInvisible(), 'display-none': isHidden() }" 
    [ngStyle]="{ 'margin-top': marginTop(), 'margin-right' : marginRight(), 'margin-bottom': marginBottom(), 'margin-left': marginLeft() }">
    
    <div class="coer-grid" [ngStyle]="{ 'width' : width(), 'min-width': minWidth(), 'max-width': maxWidth() }">
        
        <!-- Header -->
        <coer-grid-header
            #header
            [label]="label()"
            [icon]="icon()"
            [IdCalculated]="_IdCalculated" 
            [search]="_search"
            [isLoadingInner]="_isLoadingInner"
            [headerSettings]="headerSettings()"
            [isLoading]="isLoading()"
            [isEnabled]="_isEnabled()"
            [dataSourceExport]="_dataSourceExport()"
            (onClickExport)="onClickExport.emit($event)"
            (onClickImport)="_Import($event)"
            (onClickAdd)="_Add()"
            (onClickSave)="onClickSave.emit($event)"
            (onKeyupEnter)="onKeyupEnter.emit($event)"
            (onInputChange)="onInputChange.emit($event)"
            (onClickClear)="onClickClear.emit($event)"
            (onClickSearch)="onClickSearch.emit($event)">
            <ng-content></ng-content>
        </coer-grid-header>
       
        <!-- Body -->
        <coer-grid-body
            [value]="_value()"
            [IdCalculated]="_IdCalculated"
            [ApplyFormat]="_ApplyFormat"
            [columns]="_columns()"
            [dataSourceGroup]="_dataSourceGroup()"
            [bodySettings]="bodySettings()"
            [isLoadingInner]="_isLoadingInner"
            [isLoading]="isLoading()"
            [isEnabled]="_isEnabled()"
            [useContainer]="useContainer()"
            [height]="`calc(${_height()} - ${this._headerHeight()}px - ${this._footerHeight()}px - ${_containerHeight()}px)`"
            [minHeight]="`calc(${minHeight()} - ${this._headerHeight()}px - ${this._footerHeight()}px - ${_containerHeight()}px)`"
            [maxHeight]="`calc(${ maxHeight()} - ${this._headerHeight()}px - ${this._footerHeight()}px - ${_containerHeight()}px)`"
            (onClickRow)="onClickRow.emit($event)"
            (onDoubleClickRow)="onDoubleClickRow.emit($event)"
            (onClickDeleteRow)="_ClickDeleteRow($event)"
            (onClickEditRow)="onClickEditRow.emit($event)"
            (onClickModalRow)="onClickModalRow.emit($event)"
            (onClickNavigateRow)="onClickNavigateRow.emit($event)"
            (onSelectedRowChange)="_SetValue($event, true)"
            (onSelectedRow)="onSelectedRow.emit($event)"
            (onInputChange)="_SetValueInput($event)"
            (onKeyupEnter)="onKeyupEnter.emit($event)"
        ></coer-grid-body>
        
        <!-- Footer -->
        <coer-grid-footer
            [value]="_value()"
            [dataSourceSelected]="_dataSourceSelected()"
            [dataSourceFiltered]="_dataSourceFiltered()"
            [search]="_search()"
            [IdCalculated]="_IdCalculated"
            [footerSettings]="footerSettings()"
            [isLoadingInner]="_isLoadingInner"
            [isLoading]="isLoading()"
        ></coer-grid-footer>
    </div>
</section>
