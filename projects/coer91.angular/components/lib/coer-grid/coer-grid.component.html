<div class="coer-grid" 
    [ngStyle]="{ 
        'width'        : width(),
        'min-width'    : minWidth(),
        'max-width'    : maxWidth(),
        'margin-top'   : marginTop(),
        'margin-right' : marginRight(),
        'margin-bottom': marginBottom(),
        'margin-left'  : marginLeft()  
    }">
    
    <!-- Header -->
    <coer-grid-header
        [IdCalculated]="_IdCalculated"
        [search]="_search"
        [headerSettings]="headerSettings()"
        [isLoading]="isLoading()"
        [isEnabled]="_isEnabled()"
        (onClickExport)="onClickExport.emit($event)"
        (onClickImport)="onClickImport.emit($event)"
        (onClickAdd)="onClickAdd.emit($event)"
        (onClickSave)="onClickSave.emit($event)"
        (onKeyupEnter)="onKeyupEnter.emit($event)"
        (onClickClear)="onClickClear.emit($event)"
        (onClickSearch)="onClickSearch.emit($event)">
        <ng-content></ng-content>
    </coer-grid-header>
   
    <!-- Body -->
    <coer-grid-body
        [IdCalculated]="_IdCalculated"
        [ApplyFormat]="_ApplyFormat"
        [columns]="_columns()"
        [dataSourceGroup]="_dataSourceGroup()"
        [bodySettings]="bodySettings()"
        [isLoading]="_isLoading"
        [isEnabled]="_isEnabled()"
        [height]="`calc(${height()} - ${_heightCompensation()})`"
        [minHeight]="`calc(${minHeight()} - ${_heightCompensation()})`"
        [maxHeight]="`calc(${maxHeight()} - ${_heightCompensation()})`"
        (onClickRow)="onClickRow.emit($event)"
        (onDoubleClickRow)="onDoubleClickRow.emit($event)"
        (onClickDeleteRow)="_ClickDeleteRow($event)"
        (onClickEditRow)="onClickEditRow.emit($event)"
        (onClickModalRow)="onClickModalRow.emit($event)"
        (onClickNavigateRow)="onClickNavigateRow.emit($event)"
    ></coer-grid-body>
    
    <!-- Footer -->
    <coer-grid-footer
    
    ></coer-grid-footer>
</div>
