<header [id]="IdCalculated()(-1, -1, 'header-container')"     
    [ngClass]="{ 'margin-bottom-5px': (_buttons().length > 0 || _showSearch() || slotRef.childElementCount > 0) }" 
    class="flex-wrap-middle-right gap-5px">

    <div #slotRef [class]="_slotPosition()">
        <ng-content></ng-content>
    </div>

    @if(_buttons().length > 0) { 
        <div class="flex-basis-min-content display-flex gap-5px"> 
            <input type="file" 
                #inputFileRef 
                class="display-none"
                [multiple]="false" 
                (change)="_Import($event)" 
                (cancel)="isLoadingInner().set(false)"
                [accept]="_importAccept()">

            @for(button of _buttons(); track button.icon) {
                <coer-button
                    [type]="headerSettings().buttonType || 'icon-outline'" 
                    [icon]="button.icon"
                    [color]="button.color"
                    [path]="button.path"      
                    [isLoading]="button.isLoading"
                    (onClick)="button.event.emit()"
                ></coer-button>
            }
        </div>
    }

    @if(_showSearch()) {
        <div class="mv-flex-basis-100 mv-flex-grow-1 xs-flex-basis-100 md-flex-basis-min-content">
            <coer-textbox
                #searchRef
                [id]="IdCalculated()(-1, -1, 'search')" 
                [ngModel]="search()()"
                minWidth="250px"
                placeholder="Search" 
                [selectOnFocus]="true"
                [showSearchButton]="true"
                [showClearButton]="true"
                [isLoading]="isLoading() || isLoadingInner()()"
                (onValueChange)="search().set($event)"
                (onKeyupEnter)="onKeyupEnter.emit({
                    position: 'HEADER',
                    element: 'inputSearch', 
                    value: ($event || '')
                })"
                (onClickClear)="onClickClear.emit({
                    position: 'HEADER',
                    element: 'inputSearch', 
                    value: $event
                })"
                (onClickSearch)="onClickSearch.emit({
                    position: 'HEADER',
                    element: 'inputSearch', 
                    value: ($event || '')
                })"
            ></coer-textbox> 
        </div>
    }
</header>
