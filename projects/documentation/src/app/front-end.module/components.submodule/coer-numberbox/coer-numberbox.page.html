<coer-page-title
    title="Numberbox"
    [breadcrumbs]="breadcrumbs"
    [goBack]="goBack"
></coer-page-title>
 
<section class="container-section">
    <coer-numberbox
        [min]="-0.55"
        [max]="9999999999" 
        [decimals]="2"
        [format]="'number'"
        [showStepIcon]="true"
    ></coer-numberbox>
</section>
