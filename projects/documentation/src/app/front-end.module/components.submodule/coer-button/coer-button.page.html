<coer-page-title
    title="Button"
    [breadcrumbs]="breadcrumbs()"
    [goBack]="goBack"
></coer-page-title> 

@for(type of typeList(); track type) {
    <section class="container-section">
        <h2>{{ type }}</h2>
        <div class="flex-wrap">
            @for(color of colorList(); track color) {
                <coer-button
                    [color]="color"
                    [type]="type"
                    (onClick)="Log(type, color)"
                ></coer-button>
            }
        </div>
    </section>
} 

<section class="container-section">
    <h2>Type - breakpoints</h2>

    <coer-button
        [breakpoints]="{
            type: {
                xxl: 'filled',
                xl: 'outline',
                lg: 'icon-filled',
                md: 'icon-filled-rounded',
                sm: 'icon-outline',
                xs: 'icon-outline-rounded',
                mv: 'icon'
            }  
        }"
    ></coer-button>
</section>
