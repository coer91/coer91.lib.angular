<coer-page-title
    title="Grid"
    [breadcrumbs]="breadcrumbs"
    [goBack]="goBack"
></coer-page-title>


    <coer-grid
        [(ngModel)]="dataSource"
        [isLoading]="false"
        [isReadonly]="false"
        height="full"
        [columns]="[
            { property: 'id'  , width: '100px',  textBreak: true,    },
            { property: 'name', color, textAlignY: 'top'  },
            { property: 'create'  , inputSwitch: true },
            { property: 'update'  , inputSwitch: true },
            { property: 'delete'  , inputSwitch: true } 
        ]" 
        [headerSettings]="{   
            exportButton: { show: true, onlySelectedRows: true  },
            importButton: { show: true, },
            addButton:    { show: true  },
            saveButton:   { show: true, },
            search:       { show: true, properties: ['name'], preventDefault: false },
            slotPosition: 'left'
        }"
        [bodySettings]="{
            showStriped: true,
            showBorders: false,
             
            selectionRows:  { show: true, selectOverRow: true, selectAllowed: 2 },
            deleteButton:   { show: true, showConfirmation: false },
            editButton:     { show: true, },
            modalButton:    { show: true, },
            navigateButton: { show: true, },
        }" 
        (onSelectedRow)="Log('onSelectedRow', $event)"
        (onInputChange)="Log('onInputChange', $event)"
        (onClickRow)="Log('onClickRow', $event)",
        (onDoubleClickRow)="Log('onDoubleClickRow', $event)"
    >

        <coer-selectbox 
            [(ngModel)]="drop"
            [dataSource]="[
                { id: 1, name: 'one' },
                { id: 2, name: 'two' },
                { id: 3, name: 'three' },
                { id: 4, name: 'four' },
                { id: 5, name: 'five' },
                { id: 6, name: 'six' },
                { id: 7, name: 'seven' }
            ]"
        ></coer-selectbox>
    </coer-grid>

{{ dataSource() | json }}
