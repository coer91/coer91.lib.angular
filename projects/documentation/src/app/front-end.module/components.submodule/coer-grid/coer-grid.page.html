<coer-page-title
    title="Grid"
    [breadcrumbs]="breadcrumbs"
    [goBack]="goBack"
></coer-page-title>

<section class="container-section">
    <coer-grid
        [(ngModel)]="dataSource"
        [bodySettings]="{
            showStriped: true,
            showBorders: false,
            showHover: false,
            deleteButton: { show: true, color: 'success', preventDefault: true },
            editButton: { show: true, color: 'warning' },
            modalButton: { show: true, color: 'dark' },
            navigateButton: { show: true, color: 'secondary' },
        }"
    ></coer-grid>
</section> 

{{ dataSource() | json }}
