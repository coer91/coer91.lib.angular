<coer-page-title
    title="Grid"
    [breadcrumbs]="breadcrumbs"
    [goBack]="goBack"
></coer-page-title>


    <coer-grid
        [(ngModel)]="dataSource"
        [isLoading]="false"
        [isReadonly]="false"
        [isInvisible]="false"
        [isHidden]="false"
        [useContainer]="false"
        label="Componentes triple Action"
        icon="i91-home-door-fill"
        height="400px"
        marginLeft="30px"
        [columns]="[
            { property: 'id'  , width: '100px',  textBreak: true,    },
            { property: 'name', inputTextbox },
            { property: 'case' , inputSelectbox }, 
            { property: 'create'  , inputSwitch: true },
            { property: 'update'  , inputSwitch: true },
            { property: 'delete'  , inputSwitch: true },
        ]" 
        [headerSettings]="{   
            exportButton: { show: true, fileName: 'ddddd' },
            importButton: { show: true, },
            addButton:    { show: true  },
            saveButton:   { show: true, },
            search:       { show: true, properties: ['name'], preventDefault: false },
            slotPosition: 'left'
        }"
        [bodySettings]="{
            showStriped: true,
            showBorders: false,
            focusNext: true,
            selectionRows:  { show: true, selectOverRow: true, selectAllowed: null },
            deleteButton:   { show: true, showConfirmation: false },
            editButton:     { show: true, },
            modalButton:    { show: true, },
            navigateButton: { show: true, },
        }" 
      
    >
 
        
    </coer-grid>

{{ dataSource() | json }}
