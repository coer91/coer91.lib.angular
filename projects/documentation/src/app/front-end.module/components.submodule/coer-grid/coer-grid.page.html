<coer-page-title
    title="Grid"
    [breadcrumbs]="breadcrumbs"
    [goBack]="goBack"
></coer-page-title>


    <coer-grid
        [(ngModel)]="dataSource"
        [isLoading]="false"
        [isReadonly]="false"
        [isInvisible]="false"
        [isHidden]="false"
        [useContainer]="true"
        label="Componentes triple Action"
        icon="i91-home-door-fill"
        height="full"
        marginLeft="30px"
        [columns]="[
            { property: 'id'  , width: '100px',  textBreak: true, format: 'currency'   },
            { property: 'name' },
            { property: 'case'    , format: 'date'  }, 
            { property: 'case2'    , format: 'datetime'  }, 
            { property: 'case3'    , format: 'time'  }, 
        ]" 
        [headerSettings]="{   
            exportButton: { show: true, fileName: 'ddddd' },
            importButton: { show: true, },
            addButton:    { show: true  },
            saveButton:   { show: true, },
            search:       { show: true, properties: null, preventDefault: false },
            slotPosition: 'left'
        }"
        [bodySettings]="{            
            showStriped: true,
            showBorders: false,
            focusNext: true,
            selectionRows:  { show: false, selectOverRow: true, selectAllowed: null },
            deleteButton:   { show: false, showConfirmation: false },
            editButton:     { show: false, },
            modalButton:    { show: false, },
            navigateButton: { show: false, },
        }" 
        [footerSettings]="{
            show: true,
        }"
      
    >
 
        
    </coer-grid>
