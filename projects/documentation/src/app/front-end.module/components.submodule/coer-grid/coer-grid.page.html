<coer-page-title
    title="Grid"
    [breadcrumbs]="breadcrumbs"
    [goBack]="goBack"
></coer-page-title>

<section class="container-section">
    <coer-grid
        [(ngModel)]="dataSource"
        [bodySettings]="{
            deleteButton: { show: true, color: 'success' },
            editButton: { show: Show, color: 'warning' },
            modalButton: { show: true, color: 'dark' },
            navigateButton: { show: true, color: 'secondary' },
        }"
    ></coer-grid>
</section> 

{{ dataSource() | json }}
