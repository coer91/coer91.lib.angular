<coer-page-title
    title="Grid"
    [breadcrumbs]="breadcrumbs()"
    [goBack]="goBack"
></coer-page-title>

    <div #oter class="container-section">
        <div class="flex-basis-300px flex-grow-1">
                <coer-selectbox
                    #project
                    label="Project"
                ></coer-selectbox>
            </div>
            
            <div class="flex-basis-300px flex-grow-1">
                <coer-selectbox
                    #menuType
                    label="type" 
                     
                ></coer-selectbox> 
            </div>

            <div class="flex-basis-300px flex-grow-1">
               <coer-textbox
                    #icon
                    label="icon" 
               ></coer-textbox>
            </div>
    </div>


    <coer-grid
        [(ngModel)]="dataSource"
        [isLoading]="false"
        [isReadonly]="false"
        [isInvisible]="false"
        [isHidden]="false"
        [useContainer]="true"
        label="Componentes triple Action"
        icon="i91-home-door-fill"
        height="full"
        marginLeft="30px"
        [siblings]="[oter]"
        [columns]="[
            { property: 'id'  , width: '100px',  textBreak: true, format: 'currency', inputNumberbox   },
            { property: 'option'    , inputSelectbox  },  
            { property: 'name', show: showColumn() },
        ]" 
        [headerSettings]="{ 
            filterButton: { show: true },  
            exportButton: { show: true, fileName: 'ddddd' },
            importButton: { show: true, },
            addButton:    { show: true  },
            saveButton:   { show: true, },
            search:       { show: true, properties: null, preventDefault: false },
            slotPosition: 'left'
        }"
        [bodySettings]="{            
            showStriped: true,
            showBorders: false,
            focusNext: true,
            selectionRows:  { show: false, selectOverRow: true, selectAllowed: null },
            deleteButton:   { show: false, showConfirmation: false },
            editButton:     { show: false, },
            modalButton:    { show: false, },
            navigateButton: { show: false, },
        }" 
        [footerSettings]="{
            show: true,
        }"
        (onClickFilter)="modalFilters.Open()"
    >
 
        
    </coer-grid>
 
    <coer-modal
    #modalFilters
    title="Filters"
    icon="i91-filter-fill"
    width="300px"
>
    <coer-selectbox
        label="Module"
         
        [isLoading]="isLoading()"
        marginTop="15px"
        marginBottom="15px" 
    ></coer-selectbox>

    <coer-selectbox
        label="Submodule" 
        [isLoading]="isLoading()"
        marginBottom="15px"
    ></coer-selectbox>

    <coer-switch   
        [isLoading]="isLoading()"
        [textColor]="true" 
    ></coer-switch>
</coer-modal>
