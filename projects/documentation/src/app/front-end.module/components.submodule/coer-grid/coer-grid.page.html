<coer-page-title
    title="Grid"
    [breadcrumbs]="breadcrumbs"
    [goBack]="goBack"
></coer-page-title>


    <coer-grid
        [(ngModel)]="dataSource"
        [isLoading]="false"
        [isReadonly]="false"
        height="full"
        [columns]="[
        ]"
        [headerSettings]="{   
            exportButton: { show: true  },
            importButton: { show: true, },
            addButton:    { show: true  },
            saveButton:   { show: true, },
            search:       { show: true, properties: ['name'], preventDefault: false },
            slotPosition: 'left'
        }"
        [bodySettings]="{
            showStriped: true,
            showBorders: false,
            showHover: false,
            deleteButton:   { show: true, showConfirmation: false },
            editButton:     { show: true, },
            modalButton:    { show: true, },
            navigateButton: { show: true, },
        }" 
       
    >

        <coer-selectbox 
            [(ngModel)]="drop"
            [dataSource]="[
                { id: 1, name: 'one' },
                { id: 2, name: 'two' },
                { id: 3, name: 'three' },
                { id: 4, name: 'four' },
                { id: 5, name: 'five' },
                { id: 6, name: 'six' },
                { id: 7, name: 'seven' }
            ]"
        ></coer-selectbox>
    </coer-grid>

{{ dataSource() | json }}
